# SwiftLint Configuration
# Ref: https://github.com/realm/SwiftLint

# -----------------------------------------------------------------------------
# Rules Configuration
# -----------------------------------------------------------------------------

# Rules enabled by default that should be disabled
disabled_rules:
  - trailing_whitespace        # Xcode sometimes adds trailing whitespace automatically
  - colon                      # Can be too strict with custom formatting
  - comma                      # Can be too strict with custom formatting
  - control_statement          # Disables parenthesized conditions warnings

# Optional rules that are disabled by default but we want to enable
opt_in_rules:
  - empty_count                # Prefer `.isEmpty` over `.count == 0`
  - empty_string               # Prefer `.isEmpty` over `== ""`
  - force_unwrapping           # Warn against forced unwrapping `!` (crucial for Clean Architecture)
  - contains_over_first_not_nil # Prefer `.contains` over `.first(where:) != nil`
  - discouraged_object_literal # Prefer programmatic colors/images over UI/NS Color/Image literals
  - first_where                # Prefer `.first(where:)` over `.filter().first`
  - implicitly_unwrapped_optional # Prevent implicitly unwrapped optionals

# -----------------------------------------------------------------------------
# Path Configurations
# -----------------------------------------------------------------------------

# Paths to include during linting (SwiftLint targets these folders)
included:
  - MovieHub

# Paths to ignore during linting (takes precedence over 'included')
excluded:
  - Pods
  - Carthage
  - build
  - DerivedData
  - MovieHubTests
  - ApplicationTests
  - MovieHub/Data/DataKit/.build
  - MovieHub/Domain/DomainKit/.build

# -----------------------------------------------------------------------------
# Rule Customizations
# -----------------------------------------------------------------------------

# Force cast warning instead of error
force_cast: warning

# Force try warning instead of error
force_try:
  severity: warning

# Line length limits
line_length:
  warning: 140
  error: 200
  ignores_urls: true
  ignores_function_declarations: true
  ignores_comments: true

# File length limits
file_length:
  warning: 600
  error: 1000

# Function body length limits
function_body_length:
  warning: 60
  error: 100

# Type body length (struct/class/enum size)
type_body_length:
  warning: 350
  error: 500

# Naming rules
type_name:
  min_length: 3
  max_length:
    warning: 40
    error: 60
  excluded:
    - ID

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - db
    - dx
    - dy
    - x
    - y
    - z
    - i
    - j
    - k

# Output format for lint reports
reporter: "xcode"
